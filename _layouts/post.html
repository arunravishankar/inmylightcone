---
layout: default
---
<article class="post">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
        {{ page.date | date: "%B %d, %Y" }}
        {% if page.tags %}
        • 
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% unless forloop.last %}, {% endunless %}
        {% endfor %}
        {% endif %}
    </div>

    <div class="post-content">
        {{ content }}
    </div>
</article>
